name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (reproducible — locked set)
        run: |
          python -m pip install --upgrade pip
          # ONE reproducible install path: the fully-pinned lock is the exact
          # transitive closure the suite is verified against, so CI can't drift.
          # Then install THIS package editable without re-resolving deps.
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps

      - name: Preflight (interpreter + deps + version drift)
        run: python scripts/preflight.py

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest -q
